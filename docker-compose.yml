version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cuda
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data:/app/data
    networks:
      - dogcat_net

  web:
    image: python:3.10-slim
    working_dir: /app
    command: pip install streamlit requests pillow && streamlit run ui/streamlit_app.py
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api
    networks:
      - dogcat_net
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0

networks:
  dogcat_net:
    driver: bridge
